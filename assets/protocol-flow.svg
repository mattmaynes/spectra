<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 410" width="1240" height="410" role="img" aria-label="The Spectra loop: Route, Spec, Plan, Build, Test, Review, Merge, Reflect — with learnings feeding back into the next change">
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5a82d6"/>
      <stop offset="0.5" stop-color="#7d72c8"/>
      <stop offset="1"   stop-color="#9a6fb0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L11 6 L1 11 z" fill="#5b6573"/>
    </marker>
    <marker id="arrowf" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L11 6 L1 11 z" fill="#9a6fb0"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="1239" height="409" rx="16" fill="#0d1117" stroke="#1b2129"/>

  <!-- title -->
  <text x="40" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="23" font-weight="650" fill="#e6edf3">The Spectra loop</text>
  <text x="40" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" fill="#7d8896">Spec-driven flow with a feedback loop — intent captured up front, learning captured at the end.</text>

  <!-- phase captions -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5" fill="#5c6675" text-anchor="middle">
    <text x="257.5"  y="128">INTENT</text>
    <text x="620"    y="128">MAKE</text>
    <text x="910"    y="128">SHIP</text>
    <text x="1127.5" y="128">LEARN</text>
  </g>

  <!-- inter-node connectors -->
  <g stroke="#3a434f" stroke-width="2" marker-end="url(#arrow)">
    <line x1="174.5"  y1="186" x2="195.5"  y2="186"/>
    <line x1="319.5"  y1="186" x2="340.5"  y2="186"/>
    <line x1="464.5"  y1="186" x2="485.5"  y2="186"/>
    <line x1="609.5"  y1="186" x2="630.5"  y2="186"/>
    <line x1="754.5"  y1="186" x2="775.5"  y2="186"/>
    <line x1="899.5"  y1="186" x2="920.5"  y2="186"/>
    <line x1="1044.5" y1="186" x2="1065.5" y2="186"/>
  </g>

  <!-- nodes (uniform, neutral) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <rect x="52.5"   y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="112.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Route</text>
    <text x="112.5"  y="204" font-size="12" fill="#7d8896">triage the change</text>

    <rect x="197.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="257.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Spec</text>
    <text x="257.5"  y="204" font-size="12" fill="#7d8896">docs/specs/</text>

    <rect x="342.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="402.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Plan</text>
    <text x="402.5"  y="204" font-size="12" fill="#7d8896">docs/plans/</text>

    <rect x="487.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="547.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Build</text>
    <text x="547.5"  y="204" font-size="12" fill="#7d8896">git worktree</text>

    <rect x="632.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="692.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Test</text>
    <text x="692.5"  y="204" font-size="12" fill="#7d8896">green first</text>

    <rect x="777.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="837.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Review</text>
    <text x="837.5"  y="204" font-size="12" fill="#7d8896">4 personas</text>

    <rect x="922.5"  y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="982.5"  y="183" font-size="20" font-weight="600" fill="#e6edf3">Merge</text>
    <text x="982.5"  y="204" font-size="12" fill="#7d8896">on approval</text>

    <rect x="1067.5" y="150" width="120" height="72" rx="11" fill="#141a21" stroke="#28303a"/>
    <text x="1127.5" y="183" font-size="20" font-weight="600" fill="#e6edf3">Reflect</text>
    <text x="1127.5" y="204" font-size="12" fill="#7d8896">docs/overview/</text>
  </g>

  <!-- spectrum rail grounding the row -->
  <rect x="52.5" y="236" width="1135" height="2.5" rx="1.25" fill="url(#rail)" opacity="0.5"/>

  <!-- feedback loop: Reflect -> learnings -> Route -->
  <path d="M1127.5 226 C1127.5 322 940 342 690 342 C440 342 112.5 322 112.5 230"
        fill="none" stroke="url(#rail)" stroke-width="2" stroke-linecap="round" opacity="0.9" marker-end="url(#arrowf)"/>
  <text x="690" y="338" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500" fill="#8a93a1">feedback → learnings feed the next change</text>
</svg>
