<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 168" width="540" height="168" role="img" aria-label="Spectra — spec-driven development with learning loops">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#ff5c5c"/>
      <stop offset="0.18" stop-color="#ff9f43"/>
      <stop offset="0.36" stop-color="#ffd24a"/>
      <stop offset="0.54" stop-color="#4ad991"/>
      <stop offset="0.70" stop-color="#2dd4bf"/>
      <stop offset="0.85" stop-color="#4aa8ff"/>
      <stop offset="1"    stop-color="#b07cff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#ff5c5c"/>
      <stop offset="0.25" stop-color="#ffd24a"/>
      <stop offset="0.50" stop-color="#4ad991"/>
      <stop offset="0.75" stop-color="#4aa8ff"/>
      <stop offset="1"    stop-color="#b07cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#4aa8ff" stop-opacity="0.45"/>
      <stop offset="1"   stop-color="#4aa8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9ec5ff"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="539" height="167" rx="22" fill="#0d1117" stroke="#222b36"/>

  <!-- emblem: orbit ring + AI node constellation -->
  <g transform="translate(96 84)">
    <circle r="60" fill="url(#glow)"/>
    <!-- spectrum orbit -->
    <circle r="46" fill="none" stroke="url(#spectrum)" stroke-width="7" stroke-linecap="round"/>
    <!-- orbiting node -->
    <circle cx="32.5" cy="-32.5" r="7.5" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="32.5" cy="-32.5" r="6" fill="#ffffff"/>
    <!-- inner AI constellation -->
    <g stroke="#5b6b7d" stroke-width="1.6">
      <line x1="0" y1="0" x2="-19" y2="-13"/>
      <line x1="0" y1="0" x2="20" y2="-10"/>
      <line x1="0" y1="0" x2="-3" y2="20"/>
    </g>
    <circle cx="-19" cy="-13" r="4" fill="#ff9f43"/>
    <circle cx="20"  cy="-10" r="4" fill="#2dd4bf"/>
    <circle cx="-3"  cy="20"  r="4" fill="#b07cff"/>
    <circle r="9" fill="url(#core)"/>
  </g>

  <!-- wordmark -->
  <text x="190" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="54" font-weight="700" letter-spacing="0.5" fill="#eef3f8">Spectra</text>
  <rect x="192" y="100" width="186" height="5" rx="2.5" fill="url(#bar)"/>
  <text x="193" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14.5" font-weight="500" letter-spacing="0.3" fill="#8b98a9">spec-driven development · learning loops</text>
</svg>
