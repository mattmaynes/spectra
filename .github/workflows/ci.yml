name: CI

# Enforce, for everyone, the standards this repo already cares about locally:
#   - test.sh (manifests, hooks, install mechanics, dogfood integrity)
#   - the README token-drift guard (same check as the local pre-commit hook, but it lives in
#     an untracked hook — so fork PRs and fresh clones are only covered here)
#   - Conventional Commits on the PR title (the squash-merged commit message)
on:
  push:
    branches: [main]
  pull_request:

# A feature branch's pushes are already covered by its PR event; only run `push` on the
# landing branch so each SHA isn't checked twice. Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./test.sh

  readme-drift:
    name: README token figures in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README has not drifted from spectra/
        run: scripts/token-report.sh --check

  commit-lint:
    name: Conventional Commit PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        # Pass the (untrusted) title via env, never interpolated into the shell command.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: scripts/check-commit-msg.sh "$PR_TITLE"

  # On a push to main (only), once the gates pass, tag + publish the version in VERSION. The
  # manifest `version` is the real update signal for installed agents; this job makes the tag +
  # GitHub Release the durable marker for the same x.y.z. It's idempotent — a push whose VERSION
  # already has a release does nothing, so non-bump pushes create nothing. This is the ONLY job
  # granted `contents: write` (job-scoped, leaving the workflow default `contents: read`): tagging
  # and creating a Release are the only writes CI performs, so least-privilege keeps them isolated.
  release:
    name: Tag & release on version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test, readme-drift]
    permissions:
      contents: write
    # A release must run to completion. The workflow-level concurrency is cancel-in-progress;
    # this job-scoped, non-cancelable group overrides it so a second quick merge to main can't
    # abort tag/Release creation mid-flight and wedge the version (architect review, PR #16).
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Tag + release if VERSION is unreleased
        # gh + GITHUB_TOKEN are runner built-ins; no untrusted GitHub context is interpolated.
        # `gh release create` makes the bare-semver tag (no `v`) at the target commit and
        # generates notes server-side from the conventional-commit titles since the prior tag.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(cat VERSION)"
          # Defense in depth: VERSION lands via a merge; never hand it to gh unvalidated, or a
          # value like '--cleanup-tag' would be parsed as a flag, not the tag (security review).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release: VERSION '$version' is not semver; refusing to tag/release." >&2
            exit 1
          fi
          # Idempotent, but distinguish a real 404 (publish) from a transient/auth failure
          # (fail loudly — don't fall through and risk a double-publish) (engineer review).
          if gh release view "$version" >/dev/null 2>release-view.err; then
            echo "Release $version already exists — nothing to do."
            exit 0
          elif ! grep -qi 'release not found' release-view.err; then
            echo "release: 'gh release view' failed for a non-404 reason:" >&2
            cat release-view.err >&2
            exit 1
          fi
          gh release create "$version" --target "$GITHUB_SHA" --generate-notes
