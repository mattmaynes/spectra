name: CI

# Enforce, for everyone, the standards this repo already cares about locally:
#   - test.sh (manifests, hooks, install mechanics, dogfood integrity)
#   - the README token-drift guard (same check as the local pre-commit hook, but it lives in
#     an untracked hook - so fork PRs and fresh clones are only covered here)
#   - Conventional Commits on the PR title (the squash-merged commit message)
on:
  push:
    branches: [main]
  pull_request:

# A feature branch's pushes are already covered by its PR event; only run `push` on the
# landing branch so each SHA isn't checked twice. Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./test.sh

  readme-drift:
    name: README token figures in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README has not drifted from spectra/
        run: scripts/token-report.sh --check

  commit-lint:
    name: Conventional Commit PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        # Pass the (untrusted) title via env, never interpolated into the shell command.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: scripts/check-commit-msg.sh "$PR_TITLE"

  release:
    name: Tag + GitHub Release on version bump
    runs-on: ubuntu-latest
    # Landing branch only, and only after the gating checks pass. This is the one privileged
    # job (it can create tags/releases), so it must never run on untrusted PR code - hence
    # push-only + needs. Everything else stays read-only at the workflow level.
    if: github.event_name == 'push'
    needs: [test, readme-drift]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Create the release when VERSION is new
        # Idempotent: a push whose VERSION already has a release does nothing, so the job only
        # fires on the commit that bumps VERSION. gh creates the bare-semver tag at this commit
        # in the same call - no separate git tag/push. Prefer a hand-written notes file (its
        # first non-heading line becomes the README headline via whats-new.yml); fall back to
        # auto-generated notes from the conventional-commit titles since the previous tag.
        run: |
          v="$(cat VERSION)"
          if gh release view "$v" >/dev/null 2>&1; then
            echo "Release $v already exists; nothing to do."
            exit 0
          fi
          notes="docs/releases/$v.md"
          if [ -f "$notes" ]; then
            echo "Publishing release $v from $notes"
            gh release create "$v" --target "$GITHUB_SHA" --notes-file "$notes"
          else
            echo "Publishing release $v with auto-generated notes (no $notes)"
            gh release create "$v" --target "$GITHUB_SHA" --generate-notes
          fi
